services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    command: pnpm start:dev
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  api_node_modules:
